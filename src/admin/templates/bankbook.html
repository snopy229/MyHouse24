{% extends "base_admin.html" %}
{% block content %}
    <section class="content">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-xs-12 col-md-7 col-lg-6">
                    <div class="page-header-spec">
                        <div class="form-group field-account-uid required">
                            <div class="input-group">
                                <div class="input-group-addon">№</div>
                                {{ form.number }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="box">
                <div class="box-body">
                    <div class="row">
                        <div class="col-xs-12">
                            <div class="form-group field-account-status">
                                <label class="control-label" for="account-status">Статус</label>
                                {{ form.status }}
                                <div class="help-block"></div>
                            </div>
                            <div class="form-group">
                                <label for="house_id">Дом</label>
                                {{ form.house }}
                            </div>
                            <div class="form-group">
                                <label for="section_id">Секция</label>
                                {{ form.section }}
                            </div>
                            <div class="form-group field-account-flat_id">
                                <label class="control-label" for="account-flat_id">Квартира</label>
                                {{ form.apartment }}
                                <div class="help-block"></div>
                            </div>
                            <p>
                                <b>Владелец:</b><a id="user-link" href="#" class="disabled" target="_blank">
                                    <span id="user-fullname">не выбран</span>
                                </a>
                            </p>
                            <p>
                                <b>Телефон:</b><span id="user-phone">не выбран</span>
                            </p>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-xs-12 text-right">
                            <div class="form-group">
                                <button type="reset" class="btn btn-default">Отменить</button>
                                <button type="submit" class="btn btn-success">Сохранить</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock content %}
{% block extra_js %}
    <script>
        $(document).ready(function () {
            $('#id_house').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/house',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {q: params.term, page: params.page};
                    }
                }
            });

            $('#id_section').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/section',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    }
                }
            });
            $('#id_floor').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/floor',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    }
                }
            });
            $('#id_apartment').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/flat',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    },
                    processResults: function (data) {
                        return {
                            results: data.results,
                            pagination: data.pagination
                        };
                    }
                }
            });
            $("#id_apartment").on('select2:select', function (e) {
                const apartmentId = e.params.data.id;

                $.get(`/api/admin/apartment/${apartmentId}/owner`, function (data) {
                    $('#user-fullname').text(data.fullname);
                    $('#user-phone').text(data.phone_number);
                    if (data.url) {
                        $('#user-link').attr('href', data.url).removeClass('disabled');
                    } else {
                        $('#user-link').attr('href', '#').addClass('disabled');
                    }
                });
            });


        });
    </script>
{% endblock extra_js %}
