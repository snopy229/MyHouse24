{% extends "base_admin.html" %}
{% load static %}
{% block content %}
    <section class="content">
        <div class="row">
            <!--<div class="col-xs-12 col-sm-6">-->
            <!--<h2 class="page-header">Дома</h2>-->
            <!--</div>-->
            <div class="col-xs-12">
                <div class="pull-right margin-bottom">
                    <a class="btn btn-success" href="{% url 'admin:create-house' %}">Добавить дом</a>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12">
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">Список домов</h3>
                    </div>
                    <div class="box-header with-border">
                        <h3 class="box-title"></h3>
                        <div class="box-tools">
                            <button id="clear-table-filters" class="btn btn-default btn-sm">
                                <span class="hidden-xs">Очистить</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div id="w0" class="grid-view">
                        <div class="box-body table-responsive no-padding">
                            <table id="house-table"
                                   class="table table-bordered table-hover table-striped linkedRow">
                            </table>
                        </div>
                    </div>
                    <div class="box-footer">
                        <div>
                            Количество домов: <span class="text-bold">114</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <style>
        /* Исправлено: вынос инлайнового стиля (Ошибка H021) */
        #clear-table-filters {
            margin-right: 5px;
        }

        #house-table thead tr.filters th {
            padding: 4px 8px !important;
            background-color: #f9f9f9;
            vertical-align: middle;
        }

        #house-table thead input,
        #house-table thead select {
            width: 100% !important;
            height: 28px !important;
            padding: 2px 5px !important;
            font-size: 12px !important;
            border: 1px solid #d2d6de !important;
            border-radius: 3px !important;
            box-sizing: border-box !important;
            color: #555;
        }

        #house-table thead tr.filters th:after,
        #house-table thead tr.filters th:before {
            display: none !important;
        }

        .label-status {
            font-size: 11px;
            padding: 0.2em 0.6em;
        }
    </style>
    <script language="javascript">
        $(document).ready(function () {
            AjaxDatatableViewUtils.initialize_table(
                $('#house-table'),
                "{% url 'admin:house-ajax-table' %}",
                {
                    processing: false,
                    autoWidth: false,
                    scrollX: false,
                    lengthChange: false,
                    pageLength: 50,
                    searching: true,
                    pagingType: 'numbers',
                    showing: false,
                    dom: '<"box-body"t><"box-footer clearfix"p>',
                    info: false,
                    bFilter: true
                }, {},
            );

            $('#clear-table-filters').on('click', function () {
                var datatable = $('#house-table').DataTable();
                datatable.search('');
                datatable.columns().search('');
                var $wrapper = $('#house-table_wrapper');
                $wrapper.find('input').val('');
                $wrapper.find('select').prop('selectedIndex', 0);
                $('#titleSelect, #addressSelect').val('');
                datatable.draw();
            });
        });
    </script>
{% endblock content %}
