{% extends "base_admin.html" %}
{% block content %}
    <section class="content">
        {{ form.master }}
        <div class="row">
            <div class="col-xs-12">
                <div class="pull-right margin-bottom">
                    <a class="btn btn-success" href="{% url 'admin:create-master-call' %}">Добавить заявку</a>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12">
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title"></h3>
                        <div class="box-tools">
                            <a href="#" class="btn btn-default btn-sm">
                                <span class="hidden-xs">Очистить</span><i class="fa fa-eraser visible-xs" aria-hidden="true"></i>
                            </a>
                        </div>
                    </div>
                    <div id="w0" class="grid-view">
                        <div class="box-body table-responsive no-padding">
                            <table id="master-call-table"
                                   class="table table-bordered table-hover table-striped linkedRow">
                            </table>
                        </div>
                        <div class="box-footer clearfix"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <style>
        #clear-table-filters {
            margin-right: 5px;
        }

        #master-call-table thead tr.filters th {
            padding: 4px 8px !important;
            vertical-align: middle;
        }

        #master-call-table thead input,
        #master-call-table thead select {
            background: white;
            width: 100% !important;
            height: 29px !important;
            padding: 2px 5px !important;
            font-size: 12px !important;
            border: 1px solid #d2d6de !important;
            border-radius: 3px !important;
            box-sizing: border-box !important;
        }

        #master-call-table thead tr.filters th:after,
        #master-call-table thead tr.filters th:before {
            display: none !important;
        }

        .select2-container .select2-selection--single {
            border: 1px solid #d2d6de !important;
            border-radius: 0 !important;
        }


        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 32px !important;
            padding-left: 12px !important;
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 32px !important;
        }

    </style>
{% endblock content %}
{% block extra_js %}
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/daterangepicker/daterangepicker.min.js"></script>
    <script>
        $(document).ready(function () {
            AjaxDatatableViewUtils.initialize_table(
                $('#master-call-table'),
                "{% url 'admin:master-call-ajax-table' %}",
                {
                    processing: true,
                    autoWidth: false,
                    scrollX: false,
                    lengthChange: false,
                    pageLength: 50,
                    searching: true,
                    pagingType: 'numbers',
                    showing: false,
                    ordering: false,
                    dom: '<"box-body"t><"box-footer clearfix"p>',
                    info: false,
                    bFilter: true,
                    language: {
                        url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ru.json"
                    },
                    initComplete: function (settings, json) {
                        var api = this.api();

                        function setupColumnFilter(colName, selectId, ajaxUrl, dependentDataFunc) {
                            var column = api.column(colName + ':name');
                            if (column.index() !== undefined) {
                                var $cell = $(column.footer());

                                if ($cell.length === 0 || $cell.is(':empty')) {
                                    $cell = $('#master-call-table thead tr:eq(1) th').eq(column.index());
                                }

                                $cell.empty();

                                var $select = $(selectId);
                                $select.appendTo($cell);

                                $select.select2({
                                    width: '100%',
                                    placeholder: "Все",
                                    allowClear: true,
                                    ajax: {
                                        url: ajaxUrl,
                                        dataType: 'json',
                                        delay: 250,
                                        data: function (params) {
                                            var query = {
                                                q: params.term,
                                                page: params.page
                                            };

                                            if (dependentDataFunc) {
                                                $.extend(query, dependentDataFunc());
                                            }

                                            return query;
                                        }
                                    }
                                });

                                $cell.on('click', function (e) {
                                    e.stopPropagation();
                                });
                            }
                        }

                        function setupRangeFilter(colName) {
                            var column = api.column(colName + ':name');
                            if (column.index() !== undefined) {
                                var $cell = $('#master-call-table thead tr:eq(1) th').eq(column.index());
                                $cell.empty();

                                var $input = $('<input>', {
                                    type: 'text',
                                    id: 'date_range',
                                    class: 'form-control input-sm',
                                });

                                $input.appendTo($cell);
                                $input.daterangepicker({
                                    autoUpdateInput: false,
                                });
                                $input.on('apply.daterangepicker', function (ev, picker) {
                                    $(this).val(
                                        picker.startDate.format('YYYY-MM-DD') +
                                        ' - ' +
                                        picker.endDate.format('YYYY-MM-DD')
                                    );
                                    $('#master-call-table').DataTable().ajax.reload();
                                });

                                $input.on('cancel.daterangepicker', function () {
                                    $(this).val('');
                                    $('#master-call-table').DataTable().ajax.reload();
                                })
                            }

                        }

                        setupColumnFilter('master', '#id_master', '/api/admin/master', null);
                        setupRangeFilter('date')

                        $('#id_master').on('change.select2', function () {
                            $('#master-call-table').DataTable().ajax.reload();
                        });
                    }
                },
                {
                    master: function () {
                        return $('#id_master').val();
                    },
                    date_from: function () {
                        var val = $('#date_range').val();
                        if (!val) return null;
                        return val.split(' - ')[0];
                    },
                    date_to: function () {
                        var val = $('#date_range').val();
                        if (!val) return null;
                        return val.split(' - ')[1];
                    },
                }
            )
            ;
            $('body').on('click', 'tr[data-href]', function (e) {


                if ($(e.target).closest('a, button, .btn').length) {
                    return;
                }

                window.location = $(this).data('href');
            });

            $('.box-tools a').on('click', function (e) {
                e.preventDefault();
                $('#id_house').val(null).trigger('change');
                $('#id_section').val(null).trigger('change');
            });
        });
    </script>
{% endblock extra_js %}
