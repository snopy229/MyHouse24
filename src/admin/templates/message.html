{% extends "base_admin.html" %}
{% block content %}
    <section class="content">
        <div class="box">
            <form method="post">
                {% csrf_token %}
                <div class="box-header with-border">
                    <h3 class="box-title"></h3>
                </div>
                <div class="box-body">
                    <div class="form-group field-message-name required">
                        {{ form.theme }}
                        <div class="help-block"></div>
                    </div>
                    <div class="form-group field-message-description">{{ form.message }}</div>
                    <div class="row">
                        <div class="col-xs-12 col-md-6">
                            <h4>Кому отправить:</h4>
                            <div class="form-group field-messageaddress-user_has_debt">
                                {{ form.for_debtor }}
                                <label>Владельцам с задолженностями</label>
                                <div class="help-block"></div>
                            </div>
                            <div class="form-group field-messageaddress-house_id">
                                <label class="control-label" for="messageaddress-house_id">ЖК</label>
                                {{ form.house }}
                                <div class="help-block"></div>
                            </div>
                            <div class="form-group field-messageaddress-section_id">
                                <label class="control-label" for="messageaddress-section_id">Секция</label>
                                {{ form.section }}
                                <div class="help-block"></div>
                            </div>
                            <div class="form-group field-messageaddress-floor_id">
                                <label class="control-label" for="messageaddress-floor_id">Этаж</label>
                                {{ form.floor }}
                                <div class="help-block"></div>
                            </div>
                            <div class="form-group field-messageaddress-flat_id">
                                <label class="control-label" for="messageaddress-flat_id">Квартира</label>
                                {{ form.apartment }}
                                <div class="help-block"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box-footer">
                    <div class="pull-right">
                        <button type="submit" class="btn btn-success">
                            <i class="fa fa-envelope-o"></i> Отправить
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </section>
{% endblock content %}
{% block extra_js %}
    <script>
        $(document).ready(function () {
            $('#id_house').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/house',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {q: params.term, page: params.page};
                    }
                }
            });

            $('#id_section').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/section',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    }
                }
            });
            $('#id_floor').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/floor',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    }
                }
            });
            $('#id_apartment').select2({
                width: '100%',
                placeholder: "Выберите...",
                ajax: {
                    url: '/api/admin/flat',
                    dataType: 'json',
                    delay: 250,
                    data: function (params) {
                        return {
                            q: params.term,
                            page: params.page,
                            house_id: $('#id_house').val()
                        };
                    }
                }
            });

        });
    </script>
    <script src="https://cdn.ckeditor.com/4.16.0/standard/ckeditor.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            var editors = [
                'id_message'
            ];

            editors.forEach(function (id) {
                if (document.getElementById(id)) {
                    CKEDITOR.replace(id, {
                        toolbar: [
                            ['Format'],
                            ['Bold', 'Italic', 'Underline', 'Strike'],
                            ['NumberedList', 'BulletedList', '-', 'Outdent', 'Indent']
                        ],
                        height: 150,
                        width: '100%',
                        resize_enabled: false,
                        removePlugins: 'elementspath',
                        language: 'ru',
                        versionCheck: false

                    });
                }
            });
        });
    </script>
{% endblock extra_js %}
