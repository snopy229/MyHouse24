{% extends "base_admin.html" %}
{% block content %}
    <section class="content">
        <div class="row">
            <!--<div class="col-xs-12 col-sm-6">-->
            <!--<h2 class="page-header">Владельцы квартир</h2>-->
            <!--</div>-->
            <div class="col-xs-12">
                <div class="pull-right margin-bottom">
                    <a class="btn btn-success" href="{% url 'admin:message-create' %}">Отправить сообщение</a>
                </div>
            </div>
        </div>
        <div class="box">
            <div class="box-body no-padding">
                <form action="{% url 'admin:message_bulk_delete' %}" method="post">
                    {% csrf_token %}
                    <div id="w0" class="grid-view">
                        <div class="mailbox-controls">
                            <button type="button" class="btn btn-default btn-sm checkbox-toggle">
                                <i class="fa fa-square-o"></i>
                            </button>
                            <button type="submit" class="btn btn-default btn-sm delete-many">
                                <i class="fa fa-trash-o"></i>
                            </button>
                            <div class="pull-right"></div>
                        </div>
                        <div class="table-responsive mailbox-messages">
                            <table id="message-table" class="table table-hover table-striped linkedRow">
                            </table>
                        </div>
                        <div class="mailbox-controls">
                            <button type="button" class="btn btn-default btn-sm checkbox-toggle">
                                <i class="fa fa-square-o"></i>
                            </button>
                            <button type="submit" class="btn btn-default btn-sm delete-many">
                                <i class="fa fa-trash-o"></i>
                            </button>
                            <div class="pull-right"></div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock content %}
{% block extra_js %}
    <script>
        $(document).ready(function () {
            AjaxDatatableViewUtils.initialize_table(
                $('#message-table'),
                "{% url 'admin:message-ajax-table' %}",
                {
                    processing: false,
                    autoWidth: false,
                    pageLength: 50,
                    scrollX: false,
                    lengthChange: false,
                    ordering: false,
                    order: [[0, 'desc']],
                    pagingType: 'numbers',
                    showing: false,
                    info: false,
                    bFilter: true,
                    language: {
                        url: "https://cdn.datatables.net/plug-ins/1.13.6/i18n/ru.json"
                    },
                },
            )
            ;
            $(document).on('click', '.checkbox-toggle', function () {
                const clicks = $(this).data('clicks');
                const faIcon = $('.checkbox-toggle i');
                const checkboxes = $("#message-table input[type='checkbox']");

                if (clicks) {
                    checkboxes.prop('checked', false);
                    faIcon.removeClass('fa-check-square-o').addClass('fa-square-o');
                } else {
                    checkboxes.prop('checked', true);
                    faIcon.removeClass('fa-square-o').addClass('fa-check-square-o');
                }
                $(this).data('clicks', !clicks);
            });

            $('#bulk-delete-form').on('submit', function (e) {
                const selectedCount = $("input[name='item_ids']:checked").length;
                if (selectedCount === 0) {
                    alert('Выберите хотя бы один элемент');
                    return false;
                }
                return confirm('Удалить выбранные сообщения (' + selectedCount + ')?');
            });
        });
    </script>
{% endblock extra_js %}
