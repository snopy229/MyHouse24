{% extends "base_static.html" %}
{% block structure %}
    <body class="hold-transition skin-black-light">
        <nav class="navbar navbar-default navbar-fixed-top max-height nav-custom-height">
            <div class="container">
                <div class="navbar-header">
                    <button type="button"
                            class="navbar-toggle collapsed"
                            data-toggle="collapse"
                            data-target="#menuBtn"
                            aria-expanded="false">
                        <span class="sr-only">Toggle navigation</span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                        <span class="icon-bar"></span>
                    </button>
                    <a class="navbar-brand brand-custom-padding" href="{% url 'home' %}">
                        <img src="https://myhouse24.demodev.cc/logo.svg"
                             class="img-responsive logo-max-height"
                             width="150"
                             height="40"
                             alt="Logo">
                    </a>
                </div>
                <div class="collapse navbar-collapse" id="menuBtn">
                    <ul class="nav navbar-nav navbar-right">
                        <li class="{% if request.path == '/' %}active{% endif %}">
                            <a href="{% url 'managements:main-page' %}">Главная</a>
                        </li>
                        <li class="{% if request.path == '/about/' %}active{% endif %}">
                            <a href="{% url 'managements:about_us' %}">О нас</a>
                        </li>
                        <li class="{% if request.path == '/services/' %}active{% endif %}">
                            <a href="{% url 'managements:services' %}">Услуги</a>
                        </li>
                        <li class="{% if request.path == '/contacts/' %}active{% endif %}">
                            <a href="{% url 'managements:contacts-page' %}">Контакты</a>
                        </li>
                        <li>
                            <a href="{% url 'user:login-owner' %}"><i class="fas fa-sign-in-alt"></i> Вход</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
        <div class="main-wrapper main-content-spacing">
            {% block content %}
            {% endblock content %}
        </div>
        <footer class="footer">
            <div class="container">
                <div class="row">
                    <div class="col-xs-12 text-center">
                        <p class="text-muted">
                            Разработано <a href="#">AVADA-MEDIA</a>.
                        </p>
                    </div>
                </div>
            </div>
        </footer>
    </body>
{% endblock structure %}
