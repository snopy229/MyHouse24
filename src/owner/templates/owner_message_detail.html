{% extends "base_owner.html" %}
{% block content %}
    <section class="content">
        <div class="box">
            <div class="box-body no-padding">
                <div class="mailbox-read-info">
                    <h3>{{ message.theme }}</h3>
                    <h5>
                        От: {{ message.sender.fullname }} <span class="mailbox-read-time pull-right">{{ message.created_at }}</span>
                    </h5>
                </div>
                <div class="mailbox-read-message">
                    <p>{{ message.message }}</p>
                </div>
            </div>
            <div class="box-footer">
                <a href="#" data-method="post">
                    <button type="button" class="btn btn-default">
                        <i class="fa fa-trash-o"></i> Удалить
                    </button>
                </a>
            </div>
        </div>
    </section>
{% endblock content %}
