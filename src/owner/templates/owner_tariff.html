{% extends "base_owner.html" %}
{% block content %}
    <section class="content">
        <div class="box">
            <div class="box-body">
                <div class="table-responsive no-padding">
                    {% if tariff %}
                        <table class="table table-bordered table-hover">
                            <thead>
                                <tr>
                                    <th>Услуга</th>
                                    <th>Ед. изм.</th>
                                    <th>Цена за ед., грн</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in tariff.services.all %}
                                    <tr>
                                        <td>{{ item.service.title }}</td>
                                        <td>{{ item.service.units_of_measure.units }}</td>
                                        <td>{{ item.cost }}</td>
                                    </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    {% else %}
                        <p>Не указано</p>
                    {% endif %}
                </div>
            </div>
        </div>
    </section>
{% endblock content %}
