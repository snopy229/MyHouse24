{% extends "base_admin.html" %}
{% block title %}
{% endblock title %}
{% block content %}
    <section class="content">
        <div class="box">
            <div class="box-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-xs-12 col-lg-7">
                            <div class="nav-tabs-custom">
                                <div class="tab-content">
                                    <div class="tab-pane clearfix active">
                                        <div id="form-paycompany-rows">
                                            <div id="form-paycompany-0" class="row form-paycompany margin-bottom-15">
                                                <div class="col-xs-12">
                                                    <div class="form-group">
                                                        <label for="paycompany-0-name">Название компании</label>
                                                        {{ form.title }}
                                                    </div>
                                                    <div class="form-group">
                                                        <label for="paycompany-0-description">Информация</label>
                                                        {{ form.information }}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-xs-12 text-center">
                            <div class="form-group">
                                <button type="reset" class="btn btn-default">Отменить</button>
                                <button type="submit" class="btn btn-success">Сохранить</button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock content %}
