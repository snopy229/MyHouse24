{% extends "base_admin.html" %}
{% load static %}
{% block title %}
    Пользователи
{% endblock title %}
{% block content %}
    <section class="content">
        <div class="row">
            <div class="col-xs-12">
                <div class="pull-right margin-bottom">
                    <a class="btn btn-success" href="{% url 'settings:create-user' %}">Создать пользователя</a>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-xs-12">
                <div class="box">
                    <div class="box-header with-border">
                        <h3 class="box-title">Список пользователей</h3>
                    </div>
                    <div id="w0" class="grid-view">
                        <div class="box-body table-responsive no-padding">
                            <table id="user-table"
                                   class="table table-bordered table-hover table-striped linkedRow">
                            </table>
                        </div>
                        <div class="box-footer clearfix">
                            <div id="pagination" class="pagination pagination-sm no-margin pull-right"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <style>
        #roleSelect,
        #statusSelect,
        #roleSelect option,
        #statusSelect option {
            color: #333 !important;
            background-color: #fff !important;
        }

        .status-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.85em;
            font-weight: bold;
        }

        .status-active {
            background: #49f601;
            color: white;
        }

        .status-banned {
            background: #f2dede;
            color: white;
        }

        .status-pending {
            background: #fcf8e3;
            color: white;
        }

        .page-btn {
            padding: 5px 10px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
        }

        .page-btn.active {
            background: #3c8dbc;
            color: white;
            border-color: #3c8dbc;
        }
    </style>
    <script src="//cdn.datatables.net/1.10.22/js/jquery.dataTables.min.js"></script>
    <script type="text/javascript"
            src="{% static 'ajax_datatable/js/utils.js' %}"></script>
    <script language="javascript">
        $(document).ready(function () {
            AjaxDatatableViewUtils.initialize_table(
                $('#user-table'),
                "{% url 'settings:user-ajax-table' %}",
                {
                    // extra_options (example)
                    processing: false,
                    autoWidth: false,
                    scrollX: false,
                    lengthChange: false,
                    pageLength: 50,

                    searching: false,
                    pagingType: 'numbers',
                    showing: false,

                    dom: '<"box-body"t><"box-footer clearfix"p>',

                    info: false,
                }, {},
            );
        });

    </script>
{% endblock content %}
